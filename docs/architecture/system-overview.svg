<svg viewBox="0 0 1440 1100" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7d8694"/></marker>
    <style>
      .nm{font-weight:700;font-size:15px;fill:#fff}
      .ty{font-size:10.5px;fill:rgba(255,255,255,.82);font-weight:600}
      .ds{font-size:11px;fill:rgba(255,255,255,.9)}
      .lbl{font-size:11px;fill:#48515e;font-weight:600}
      .lnk{stroke:#9aa3b0;stroke-width:1.6;fill:none}
      .ttl{font-size:21px;font-weight:800;fill:#1f2328}
      .sub{font-size:13px;fill:#57606a}
      .legt{font-size:11.5px;fill:#3a414c;font-weight:600}
      .lanelbl{font-size:12px;font-weight:700;fill:#5b6675;letter-spacing:.03em}
    </style>
  </defs>

  <!-- card background (own background → renders the same in GitHub light & dark themes) -->
  <rect x="0" y="0" width="1440" height="1100" rx="14" fill="#ffffff" stroke="#d0d7de"/>
  <text class="ttl" x="40" y="48">Aegis — System Architecture</text>
  <text class="sub" x="40" y="72">C4 container view · a multi-tenant access-control platform: gateway → 7 services → shared access-control core → Postgres (RLS) / Redis / Kafka</text>

  <!-- ===================== LEGEND ===================== -->
  <g transform="translate(1090,92)">
    <rect x="0" y="0" width="312" height="150" rx="9" fill="#f6f8fa" stroke="#d0d7de"/>
    <text class="legt" x="14" y="22" font-weight="800" fill="#1f2328">Legend</text>
    <rect x="14" y="34" width="22" height="15" rx="4" fill="#3b6fb5"/><text class="legt" x="44" y="46">Gateway / edge (hexagon)</text>
    <rect x="14" y="56" width="22" height="15" rx="4" fill="#3b82c4"/><text class="legt" x="44" y="68">Service (rounded box)</text>
    <rect x="14" y="78" width="22" height="15" rx="4" fill="#8b5cc7"/><text class="legt" x="44" y="90">Worker / job</text>
    <path d="M14,100 a11,4 0 0 0 22,0 v9 a11,4 0 0 1 -22,0 z" fill="#14a08a"/><ellipse cx="25" cy="100" rx="11" ry="4" fill="#1cb89f"/><text class="legt" x="44" y="112">Datastore (cylinder)</text>
    <rect x="160" y="34" width="22" height="15" rx="2" fill="#d08326"/><line x1="167" y1="34" x2="167" y2="49" stroke="#fff"/><line x1="174" y1="34" x2="174" y2="49" stroke="#fff"/><text class="legt" x="190" y="46">Message bus (Kafka)</text>
    <path d="M160,62 q-6,0 -6,7 q-8,0 -5,8 h28 q6,-2 1,-8 q2,-9 -8,-7 q-3,-4 -10,0 z" fill="#6b7280"/><text class="legt" x="190" y="68">External system (cloud)</text>
    <circle cx="167" cy="92" r="6" fill="#5b6776"/><path d="M159,108 q8,-12 16,0 z" fill="#5b6776"/><text class="legt" x="190" y="98">Person / API client</text>
    <text class="legt" x="14" y="138" fill="#57606a" font-weight="500">Arrows are directional + labeled with the interaction.</text>
  </g>

  <!-- ===================== EDGES (under nodes) ===================== -->
  <!-- user -> gateway -->
  <path class="lnk" d="M720,168 L720,196" marker-end="url(#ah)"/>
  <text class="lbl" x="730" y="186">HTTPS · Bearer JWT + X-Tenant-Id</text>
  <!-- gateway -> services lane -->
  <path class="lnk" d="M720,286 L720,322" marker-end="url(#ah)"/>
  <text class="lbl" x="730" y="310">routes by path · /{service}/v1</text>
  <!-- services lane -> postgres / redis / kafka -->
  <path class="lnk" d="M360,540 C360,580 300,600 270,628" marker-end="url(#ah)"/>
  <text class="lbl" x="60" y="600">read / write · SQL, RLS (SET LOCAL app.current_tenant)</text>
  <path class="lnk" d="M700,540 C700,580 660,600 650,628" marker-end="url(#ah)"/>
  <text class="lbl" x="560" y="600">cache + policy-reload pub/sub</text>
  <path class="lnk" d="M1040,540 C1040,580 1080,600 1095,628" marker-end="url(#ah)"/>
  <text class="lbl" x="980" y="600">publish domain events · via transactional outbox</text>
  <!-- kafka -> workers -->
  <path class="lnk" d="M1150,790 C1150,820 1110,835 1095,852" marker-end="url(#ah)"/>
  <text class="lbl" x="930" y="828">deliver topics → consumers</text>
  <path class="lnk" d="M1280,790 L1280,852" marker-end="url(#ah)"/>
  <!-- workers -> postgres (write back) -->
  <path class="lnk" d="M900,890 C600,930 360,830 320,710" marker-end="url(#ah)"/>
  <text class="lbl" x="470" y="905">write side-effects · SQL, RLS</text>
  <!-- cli -> postgres -->
  <path class="lnk" d="M150,852 L240,712" marker-end="url(#ah)"/>
  <text class="lbl" x="60" y="800">migrations + seeders</text>
  <!-- workers -> externals -->
  <path class="lnk" d="M1000,946 L1000,978" marker-end="url(#ah)"/>
  <text class="lbl" x="700" y="970">ERP push · @aegis/connectors</text>
  <path class="lnk" d="M1280,946 L1280,978" marker-end="url(#ah)"/>
  <text class="lbl" x="1180" y="970">email · SMTP</text>

  <!-- ===================== NODES ===================== -->
  <!-- person -->
  <g transform="translate(688,96)">
    <circle cx="32" cy="20" r="16" fill="#5b6776"/><path d="M6,72 q26,-40 52,0 z" fill="#5b6776"/>
    <text class="nm" x="76" y="26" fill="#1f2328" font-size="14">User / API client</text>
    <text class="ds" x="76" y="46" fill="#57606a">acts within a tenant · holds a Bearer JWT</text>
  </g>

  <!-- gateway (hexagon) -->
  <g>
    <polygon points="560,241 588,196 852,196 880,241 852,286 588,286" fill="#3b6fb5" stroke="#2f5d9c" stroke-width="1.5"/>
    <text class="nm" x="720" y="232" text-anchor="middle">API Gateway · :4000</text>
    <text class="ty" x="720" y="250" text-anchor="middle">Container · Node + Express · edge</text>
    <text class="ds" x="720" y="270" text-anchor="middle">validate JWT (JWKS) · mint correlation id · route by path</text>
  </g>

  <!-- services lane -->
  <rect x="40" y="322" width="1180" height="218" rx="12" fill="#f3f6f9" stroke="#d6dee7"/>
  <text class="lanelbl" x="56" y="344">API SERVICES — each re-validates auth at its own PEP (defense in depth) · user-management issues JWT + serves JWKS</text>
  <!-- 7 service boxes -->
  <g fill="#3b82c4">
    <rect x="56"  y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="224" y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="392" y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="560" y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="728" y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="896" y="356" width="160" height="166" rx="9" stroke="#3173b0"/>
    <rect x="1048" y="356" width="156" height="166" rx="9" stroke="#3173b0"/>
  </g>
  <g text-anchor="middle">
    <text class="nm" x="136" y="384">user-management</text><text class="ty" x="136" y="402">:4001 · PAP/PIP</text>
    <text class="ds" x="136" y="424">identity · roles</text><text class="ds" x="136" y="440">permissions</text><text class="ds" x="136" y="456">policies · invites</text><text class="ds" x="136" y="472">sessions</text><text class="ds" x="136" y="496" font-weight="700">issues JWT/JWKS</text>
    <text class="nm" x="304" y="384">expense</text><text class="ty" x="304" y="402">:4002</text>
    <text class="ds" x="304" y="424">reports +</text><text class="ds" x="304" y="440">line items</text><text class="ds" x="304" y="456">multi-level</text><text class="ds" x="304" y="472">approval</text><text class="ds" x="304" y="496">ERP push</text>
    <text class="nm" x="472" y="384">invoice</text><text class="ty" x="472" y="402">:4007</text>
    <text class="ds" x="472" y="424">lifecycle</text><text class="ds" x="472" y="440">matching</text><text class="ds" x="472" y="456">currency-aware</text><text class="ds" x="472" y="472">dedupe</text><text class="ds" x="472" y="496">approval</text>
    <text class="nm" x="640" y="384">payroll</text><text class="ty" x="640" y="402">:4003 · PII</text>
    <text class="ds" x="640" y="424">pay-runs</text><text class="ds" x="640" y="440">payslips</text><text class="ds" x="640" y="456">field encryption</text><text class="ds" x="640" y="472">maker-checker</text><text class="ds" x="640" y="496">disburse</text>
    <text class="nm" x="808" y="384">reporting</text><text class="ty" x="808" y="402">:4004</text>
    <text class="ds" x="808" y="424">report defs</text><text class="ds" x="808" y="440">runs</text><text class="ds" x="808" y="456">async export</text><text class="ds" x="808" y="472">schedules</text><text class="ds" x="808" y="496">CQRS-lite</text>
    <text class="nm" x="976" y="384">workflow</text><text class="ty" x="976" y="402">:4005</text>
    <text class="ds" x="976" y="424">rules-as-data</text><text class="ds" x="976" y="440">engine</text><text class="ds" x="976" y="456">conditions</text><text class="ds" x="976" y="472">+ actions</text><text class="ds" x="976" y="496">(api role)</text>
    <text class="nm" x="1126" y="384">notification</text><text class="ty" x="1126" y="402">:4006</text>
    <text class="ds" x="1126" y="424">in-app + email</text><text class="ds" x="1126" y="440">text + HTML</text><text class="ds" x="1126" y="456">templates</text><text class="ds" x="1126" y="472">idempotent</text><text class="ds" x="1126" y="496">(api role)</text>
  </g>

  <!-- access-control note ribbon -->
  <rect x="40" y="552" width="1180" height="40" rx="8" fill="#eef2f7" stroke="#d6dee7"/>
  <text x="56" y="577" font-size="12.5" font-weight="700" fill="#2f6fb0">@aegis/access-control — shared PDP every service's PEP calls: RBAC (Casbin, dom=tenant) + ABAC (amount caps) + row-level scope · PDP / PEP / PAP / PIP · fail-closed</text>

  <!-- ===================== DATA / INFRA TIER ===================== -->
  <!-- postgres (cylinder) -->
  <g>
    <path d="M80,648 a200,22 0 0 0 400,0 v126 a200,22 0 0 1 -400,0 z" fill="#14a08a" stroke="#0f8a78" stroke-width="1.5"/>
    <ellipse cx="280" cy="648" rx="200" ry="22" fill="#1cb89f" stroke="#0f8a78" stroke-width="1.5"/>
    <text class="nm" x="280" y="660" text-anchor="middle">PostgreSQL · :5432</text>
    <text class="ds" x="280" y="700" text-anchor="middle">Row-Level Security (FORCE + RESTRICTIVE) · app role aegis_app (non-owner)</text>
    <text class="ds" x="280" y="720" text-anchor="middle">domain tables · casbin · event_outbox · hash-chained audit</text>
    <text class="ds" x="280" y="744" text-anchor="middle" font-weight="700">a tenant session cannot read another tenant's rows</text>
  </g>
  <!-- redis (cylinder) -->
  <g>
    <path d="M520,648 a130,20 0 0 0 260,0 v126 a130,20 0 0 1 -260,0 z" fill="#14a08a" stroke="#0f8a78" stroke-width="1.5"/>
    <ellipse cx="650" cy="648" rx="130" ry="20" fill="#1cb89f" stroke="#0f8a78" stroke-width="1.5"/>
    <text class="nm" x="650" y="660" text-anchor="middle">Redis · :6379</text>
    <text class="ds" x="650" y="700" text-anchor="middle">cache (cache-only)</text>
    <text class="ds" x="650" y="720" text-anchor="middle">policy-reload pub/sub</text>
    <text class="ds" x="650" y="740" text-anchor="middle">PDP decision cache</text>
  </g>
  <!-- kafka (queue / partitions) -->
  <g>
    <rect x="860" y="630" width="460" height="160" rx="10" fill="#d08326" stroke="#b06a1e" stroke-width="1.5"/>
    <line x1="980" y1="630" x2="980" y2="790" stroke="#fff" stroke-opacity=".35"/>
    <line x1="1100" y1="630" x2="1100" y2="790" stroke="#fff" stroke-opacity=".35"/>
    <line x1="1220" y1="630" x2="1220" y2="790" stroke="#fff" stroke-opacity=".35"/>
    <text class="nm" x="1090" y="658" text-anchor="middle">Apache Kafka · :9092</text>
    <text class="ty" x="1090" y="676" text-anchor="middle">Message bus · KRaft single broker</text>
    <text class="ds" x="1090" y="702" text-anchor="middle">14 domain-event topics + &lt;topic&gt;.dlq dead-letter</text>
    <text class="ds" x="1090" y="722" text-anchor="middle">transactional outbox → in-process relay → Kafka</text>
    <text class="ds" x="1090" y="746" text-anchor="middle">at-least-once · retry w/ backoff · poison → DLQ</text>
    <text class="ds" x="1090" y="770" text-anchor="middle" font-weight="700">consumers = the workflow + notification workers</text>
  </g>

  <!-- ===================== WORKERS + CLI ===================== -->
  <g fill="#8b5cc7">
    <rect x="56" y="852" width="190" height="92" rx="9" stroke="#7549b8"/>
    <rect x="900" y="852" width="190" height="92" rx="9" stroke="#7549b8"/>
    <rect x="1110" y="852" width="194" height="92" rx="9" stroke="#7549b8"/>
  </g>
  <g text-anchor="middle">
    <text class="nm" x="151" y="884">cli</text><text class="ty" x="151" y="902">PROCESS_TYPE=migration</text><text class="ds" x="151" y="924">migrations + seeders</text><text class="ds" x="151" y="940">one-shot, then exits</text>
    <text class="nm" x="995" y="884">workflow-worker</text><text class="ty" x="995" y="902">PROCESS_TYPE=worker</text><text class="ds" x="995" y="924">consumes events → runs rules</text><text class="ds" x="995" y="940">+ ERP-sync · produces events</text>
    <text class="nm" x="1207" y="884">notification-worker</text><text class="ty" x="1207" y="902">PROCESS_TYPE=worker</text><text class="ds" x="1207" y="924">event-only write path:</text><text class="ds" x="1207" y="940">in-app + email</text>
  </g>

  <!-- ===================== EXTERNAL SYSTEMS (cloud) ===================== -->
  <g>
    <path d="M905,1000 q-18,0 -18,20 q-24,0 -16,24 h150 q20,-4 4,-24 q8,-26 -22,-20 q-10,-12 -30,0 q-12,-12 -22,0 z" fill="#6b7280" stroke="#565d68" stroke-width="1.5"/>
    <text class="nm" x="1000" y="1030" text-anchor="middle" font-size="13">ERP systems</text>
    <text class="ds" x="1000" y="1048" text-anchor="middle">external · via @aegis/connectors</text>
  </g>
  <g>
    <path d="M1185,1000 q-18,0 -18,20 q-24,0 -16,24 h150 q20,-4 4,-24 q8,-26 -22,-20 q-10,-12 -30,0 q-12,-12 -22,0 z" fill="#6b7280" stroke="#565d68" stroke-width="1.5"/>
    <text class="nm" x="1280" y="1030" text-anchor="middle" font-size="13">Email / SMTP</text>
    <text class="ds" x="1280" y="1048" text-anchor="middle">external · outbound email</text>
  </g>
</svg>
