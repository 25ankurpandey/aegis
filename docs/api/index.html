<!doctype html>
<meta charset="utf-8">
<title>Aegis Platform API Reference</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0f1115;--panel:#161a22;--panel2:#1c222d;--border:#28303d;--fg:#e6e9ef;--muted:#9aa6b8;
    --accent:#6ea8fe;--get:#3fb950;--post:#d29922;--put:#a371f7;--delete:#f85149;--code:#0b0d11;
  }
  @media (prefers-color-scheme:light){
    :root{--bg:#f6f8fa;--panel:#fff;--panel2:#f0f3f7;--border:#d8dee6;--fg:#1b1f26;--muted:#5b6573;--code:#f0f3f7;}
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--fg)}
  header{padding:22px 26px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:20}
  header h1{margin:0;font-size:19px}
  header .sub{color:var(--muted);font-size:12px;margin-top:4px}
  .layout{display:flex;min-height:calc(100vh - 70px)}
  nav{width:260px;flex:0 0 260px;border-right:1px solid var(--border);padding:14px 0;overflow:auto;position:sticky;top:70px;height:calc(100vh - 70px)}
  nav .search{margin:0 14px 10px;width:calc(100% - 28px);padding:8px 10px;background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--fg);font-size:13px}
  nav .tag{padding:6px 16px 4px;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-top:8px}
  nav a{display:flex;gap:8px;align-items:center;padding:5px 16px;color:var(--fg);text-decoration:none;font-size:12.5px;border-left:2px solid transparent}
  nav a:hover{background:var(--panel)}
  nav a.hidden{display:none}
  main{flex:1;padding:22px 30px;overflow:auto;max-width:980px}
  .intro{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:24px;white-space:pre-wrap;color:var(--muted);font-size:13px}
  .tag-section{margin:30px 0 8px}
  .tag-section h2{font-size:16px;margin:0 0 2px;border-bottom:1px solid var(--border);padding-bottom:6px}
  .tag-section .tagdesc{color:var(--muted);font-size:12.5px;margin:4px 0 0}
  .op{border:1px solid var(--border);border-radius:9px;margin:12px 0;overflow:hidden;background:var(--panel)}
  .op>summary{list-style:none;cursor:pointer;display:flex;gap:11px;align-items:center;padding:11px 14px}
  .op>summary::-webkit-details-marker{display:none}
  .op[open]>summary{border-bottom:1px solid var(--border)}
  .verb{font-weight:800;font-size:11px;padding:3px 9px;border-radius:5px;color:#fff;flex:0 0 auto;letter-spacing:.04em}
  .verb.get{background:var(--get)}.verb.post{background:var(--post)}.verb.put{background:var(--put)}.verb.delete{background:var(--delete)}.verb.patch{background:var(--put)}
  .path{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}
  .summ{color:var(--muted);margin-left:auto;font-size:12.5px;text-align:right}
  .lock{font-size:11px;color:var(--muted)}
  .body{padding:6px 16px 16px}
  .body h4{margin:16px 0 6px;font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .desc{color:var(--fg);font-size:13px;white-space:pre-wrap}
  table{border-collapse:collapse;width:100%;margin:4px 0;font-size:12.5px}
  th,td{text-align:left;padding:6px 9px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600}
  code{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--code);padding:1px 5px;border-radius:4px;font-size:12px}
  .req{color:var(--delete);font-weight:700;font-size:11px}
  pre{background:var(--code);border:1px solid var(--border);border-radius:7px;padding:11px;overflow:auto;font-size:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--border);color:var(--muted);margin-right:5px}
  .codes td:first-child{font-weight:700;width:70px}
  .c2{color:var(--get)}.c4{color:var(--post)}.c5{color:var(--delete)}
  footer{padding:18px 30px;color:var(--muted);font-size:12px;border-top:1px solid var(--border)}
</style>
<header>
  <h1>Aegis Platform API <span class="pill" id="ver"></span></h1>
  <div class="sub" id="subtitle"></div>
</header>
<div class="layout">
  <nav>
    <input class="search" id="search" placeholder="Filter endpoints…" autocomplete="off">
    <div id="navlist"></div>
  </nav>
  <main id="main"></main>
</div>

<script>
(function(){
  var spec=JSON.parse(document.getElementById("spec").textContent);
  var VERBS=["get","post","put","patch","delete"];
  document.getElementById("ver").textContent=spec.info.version;
  document.getElementById("subtitle").textContent="OpenAPI "+spec.openapi+" — "+countOps()+" operations across "+spec.tags.length+" tags";
  function countOps(){var n=0;for(var p in spec.paths)for(var m in spec.paths[p])if(VERBS.indexOf(m)>=0)n++;return n;}
  function esc(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
  function slug(m,p){return (m+"-"+p).replace(/[^a-z0-9]+/gi,"-").toLowerCase();}

  // resolve a $ref one level (components only)
  function deref(o){
    if(o&&o["$ref"]){
      var parts=o["$ref"].replace(/^#\//,"").split("/");var cur=spec;
      for(var i=0;i<parts.length;i++)cur=cur[parts[i]];
      return cur;
    }
    return o;
  }
  function schemaName(o){ if(o&&o["$ref"])return o["$ref"].split("/").pop(); return null; }

  // render a JSON-ish example/skeleton from a schema (depth-limited)
  function skeleton(s,depth){
    s=deref(s);depth=depth||0;
    if(!s||depth>4)return "{}";
    if(s.type==="object"||s.properties){
      var props=s.properties||{};var req=s.required||[];var o={};
      for(var k in props){o[k]=leaf(props[k],depth+1);}
      return o;
    }
    if(s.type==="array")return [leaf(s.items,depth+1)];
    return leaf(s,depth);
  }
  function leaf(s,depth){
    s=deref(s);if(!s)return null;
    if(s.type==="array")return [leaf(s.items,depth+1)];
    if(s.type==="object"||s.properties)return skeleton(s,depth);
    if(s.enum)return s.enum[0];
    if(s.format==="uuid")return "00000000-0000-0000-0000-000000000000";
    if(s.format==="date")return "2026-01-01";
    if(s.format==="email")return "user@example.com";
    if(s.type==="integer"||s.type==="number")return 0;
    if(s.type==="boolean")return false;
    if(s.type==="string")return "string";
    return null;
  }

  function propsTable(s){
    s=deref(s);if(!s)return "";
    var props=s.properties||{};var req=s.required||[];
    var rows="";
    for(var k in props){
      var p=deref(props[k]);
      var t=p.type||(p["$ref"]?schemaName(props[k]):"any");
      if(t==="array")t="array["+((deref(p.items)||{}).type||"object")+"]";
      var extra=[];
      if(p.enum)extra.push("enum: "+p.enum.join(" | "));
      if(p.format)extra.push("format: "+p.format);
      if(p.minLength!=null)extra.push("minLength "+p.minLength);
      if(p.maxLength!=null)extra.push("maxLength "+p.maxLength);
      if(p.minimum!=null)extra.push("min "+p.minimum);
      if(p.maximum!=null)extra.push("max "+p.maximum);
      rows+="<tr><td><code>"+esc(k)+"</code>"+(req.indexOf(k)>=0?" <span class=req>required</span>":"")+
            "</td><td><code>"+esc(t)+"</code></td><td>"+esc(p.description||"")+
            (extra.length?" <span class=muted>("+esc(extra.join(", "))+")</span>":"")+"</td></tr>";
    }
    if(s.description&&!rows)return "<p class=desc>"+esc(s.description)+"</p>";
    return rows?"<table><tr><th>Field</th><th>Type</th><th>Notes</th></tr>"+rows+"</table>":"";
  }

  function renderOp(p,m,op){
    var id=slug(m,p);
    var secured=!(op.security&&op.security.length===0);
    var h="<details class=op id=\""+id+"\"><summary>"+
      "<span class=\"verb "+m+"\">"+m.toUpperCase()+"</span>"+
      "<span class=path>"+esc(p)+"</span>"+
      "<span class=summ>"+esc(op.summary||"")+(secured?" <span class=lock>&#128274;</span>":" <span class=lock>public</span>")+"</span>"+
      "</summary><div class=body>";
    if(op.description)h+="<p class=desc>"+esc(op.description)+"</p>";
    h+="<h4>Security</h4><p>"+(secured?"Bearer JWT required.":"Public (no token).")+"</p>";

    // params grouped
    var params=(op.parameters||[]).map(deref);
    if(params.length){
      var groups={path:[],header:[],query:[]};
      params.forEach(function(pa){(groups[pa["in"]]||(groups[pa["in"]]=[])).push(pa);});
      ["path","header","query"].forEach(function(g){
        if(groups[g].length){
          h+="<h4>"+g+" parameters</h4><table><tr><th>Name</th><th>Type</th><th>Required</th><th>Description</th></tr>";
          groups[g].forEach(function(pa){
            var s=deref(pa.schema)||{};
            h+="<tr><td><code>"+esc(pa.name)+"</code></td><td><code>"+esc(s.type||"string")+"</code></td><td>"+(pa.required?"<span class=req>yes</span>":"no")+"</td><td>"+esc(pa.description||"")+"</td></tr>";
          });
          h+="</table>";
        }
      });
    }

    // request body
    if(op.requestBody){
      var rb=op.requestBody;var sch=rb.content&&rb.content["application/json"]&&rb.content["application/json"].schema;
      h+="<h4>Request body"+(rb.required?" <span class=req>required</span>":" (optional)")+"</h4>";
      var nm=schemaName(sch);if(nm)h+="<p class=muted>schema: <code>"+esc(nm)+"</code></p>";
      h+=propsTable(sch);
      h+="<pre>"+esc(JSON.stringify(skeleton(sch),null,2))+"</pre>";
    }

    // responses
    h+="<h4>Responses</h4><table class=codes><tr><th>Code</th><th>Description</th></tr>";
    Object.keys(op.responses||{}).forEach(function(code){
      var r=deref(op.responses[code]);
      var cls=code[0]==="2"?"c2":code[0]==="4"?"c4":code[0]==="5"?"c5":"";
      h+="<tr><td class=\""+cls+"\">"+esc(code)+"</td><td>"+esc(r.description||"")+"</td></tr>";
    });
    h+="</table></div></details>";
    return h;
  }

  // build by tag
  var byTag={};
  for(var p in spec.paths){for(var m in spec.paths[p]){if(VERBS.indexOf(m)<0)continue;var op=spec.paths[p][m];var t=(op.tags&&op.tags[0])||"other";(byTag[t]||(byTag[t]=[])).push({p:p,m:m,op:op});}}

  var order=spec.tags.map(function(t){return t.name;});
  Object.keys(byTag).forEach(function(t){if(order.indexOf(t)<0)order.push(t);});

  var main=document.getElementById("main");
  var nav=document.getElementById("navlist");
  main.innerHTML="<div class=intro>"+esc(spec.info.description||"")+"</div>";

  order.forEach(function(t){
    if(!byTag[t])return;
    var tagMeta=(spec.tags||[]).filter(function(x){return x.name===t;})[0]||{};
    var sec=document.createElement("div");sec.className="tag-section";
    sec.innerHTML="<h2 id=\"tag-"+t+"\">"+esc(t)+"</h2>"+(tagMeta.description?"<p class=tagdesc>"+esc(tagMeta.description)+"</p>":"");
    byTag[t].forEach(function(e){sec.insertAdjacentHTML("beforeend",renderOp(e.p,e.m,e.op));});
    main.appendChild(sec);

    var navtag=document.createElement("div");navtag.className="tag";navtag.textContent=t;nav.appendChild(navtag);
    byTag[t].forEach(function(e){
      var a=document.createElement("a");a.href="#"+slug(e.m,e.p);
      a.dataset.k=(e.m+" "+e.p+" "+(e.op.summary||"")).toLowerCase();
      a.innerHTML="<span class=\"verb "+e.m+"\" style=font-size:9px;padding:1px 5px>"+e.m.toUpperCase()+"</span><span style=font-family:monospace>"+esc(e.p.replace(/^\/[a-z-]+\/v1/,"").replace(/^\/health/,"/health")||e.p)+"</span>";
      a.onclick=function(){var el=document.getElementById(slug(e.m,e.p));if(el)el.open=true;};
      nav.appendChild(a);
    });
  });

  document.getElementById("search").addEventListener("input",function(ev){
    var q=ev.target.value.toLowerCase().trim();
    document.querySelectorAll("nav a").forEach(function(a){
      a.classList.toggle("hidden",q&&a.dataset.k.indexOf(q)<0);
    });
  });
})();
</script>
