components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Signed access JWT from `POST /user-management/v1/auth/login`.
  parameters:
    RecordTypeParam:
      name: recordType
      in: path
      required: true
      schema:
        type: string
        enum:
          - expense_report
          - invoice
          - pay_run
      description: Polymorphic finance record type.
    ConnectorKindParam:
      name: kind
      in: path
      required: true
      schema:
        type: string
        enum:
          - ledger_one
          - finovo
          - acct_bridge
      description: ERP connector kind.
  schemas:
    SuccessEnvelope:
      type: object
      description: Standard success envelope. `data` is the entity/result; `correlationId` is echoed from context.
      properties:
        data:
          description: 'The response payload (entity, array, or result object).'
        correlationId:
          type: string
          description: Request correlation id (echoed from `X-Correlation-Id`).
      required:
        - data
    PaginatedEnvelope:
      type: object
      description: >-
        Paged success envelope. Some list endpoints return `meta` with `{ total, page, pageSize }`, others the `{
        totalCount, pageSize, pageNo, pageCount }` shape.
      properties:
        data:
          type: array
          items: {}
          description: The page of rows.
        meta:
          $ref: '#/components/schemas/PageMeta'
        correlationId:
          type: string
      required:
        - data
    PageMeta:
      type: object
      properties:
        totalCount:
          type: integer
          description: Total rows across all pages.
        total:
          type: integer
          description: Total rows (legacy alias used by some services).
        pageSize:
          type: integer
        pageNo:
          type: integer
          description: 1-based page number.
        page:
          type: integer
          description: 1-based page number (legacy alias).
        pageCount:
          type: integer
          description: Total number of pages (derived).
    ErrorEnvelope:
      type: object
      description: Terminal error envelope. 5xx errors return a generic message and omit `details`.
      properties:
        errors:
          type: array
          items:
            type: object
            properties:
              code:
                type: string
                description: Stable machine error code (e.g. E_VALIDATION).
              type:
                type: string
                description: 'Error category (VALIDATION, AUTH, NOT_FOUND, CONFLICT, SYSTEM, GATEWAY, …).'
              message:
                type: string
              details:
                description: Optional structured detail (operational 4xx only).
              correlationId:
                type: string
            required:
              - code
              - type
              - message
      required:
        - errors
    HealthStatus:
      type: object
      properties:
        service:
          type: string
        status:
          type: string
          enum:
            - ok
            - degraded
        uptime:
          type: number
        db:
          type: boolean
          description: Present only with ?details=true.
        cache:
          type: boolean
          description: Present only with ?details=true.
      required:
        - service
        - status
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
      required:
        - email
        - password
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password
    CreateRoleRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        permissions:
          type: array
          items:
            type: string
          minItems: 1
      required:
        - name
        - permissions
    AssignRoleRequest:
      type: object
      properties:
        roleId:
          type: string
          format: uuid
        scope:
          type: string
          enum:
            - all_records
            - own_and_team
            - own_only
      required:
        - roleId
    CreatePolicyRequest:
      type: object
      properties:
        permission:
          type: string
          minLength: 3
        effect:
          type: string
          enum:
            - allow
            - deny
        rule:
          type: object
          additionalProperties: true
        priority:
          type: integer
          minimum: 0
        isActive:
          type: boolean
      required:
        - permission
        - effect
    UpdatePolicyRequest:
      type: object
      description: At least one field must be supplied.
      minProperties: 1
      properties:
        permission:
          type: string
          minLength: 3
        effect:
          type: string
          enum:
            - allow
            - deny
