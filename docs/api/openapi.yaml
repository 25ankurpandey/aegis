openapi: 3.0.3
info:
  title: Aegis API
  version: 1.0.0
  description: >-
    HTTP API for the Aegis enterprise access-control platform — a multi-tenant, microservices SaaS substrate
    (centralized RBAC + ABAC PDP/PEP, PostgreSQL row-level tenant isolation, signed service-to-service calls,
    hash-chained audit). Seven business services sit behind a single gateway.


    **Edge routing.** All authenticated traffic enters through the gateway (`http://localhost:4000`), which resolves the
    first path segment (`user-management`, `expense`, `payroll`, `reporting`, `workflow`, `notification`, `invoice`) to
    a downstream service and forwards the request unchanged. Each service independently re-validates auth via its own
    PEP (defense in depth). Every external path therefore has the form `/{service}/v1/...` (public prefix `/v1`).
    `/health` bypasses auth/context middleware.


    **Required context headers.** Authenticated requests carry `X-Tenant-Id` and `X-Correlation-Id` (the gateway mints
    the correlation id at the edge if absent and echoes it on every response, including error hops). `X-Caller` is set
    to `gateway` on every forwarded hop. The tenant is ambient (driven into PostgreSQL RLS via `SET LOCAL
    app.current_tenant`) — there is no tenant path segment. Money/state-changing writes may honor an `Idempotency-Key`
    header (pay-run disburse).


    **Auth.** `register` and `login` are public; the internal recipient-directory routes use signed service-to-service
    auth (not a user JWT). Every other route requires a Bearer JWT plus a `domain.action` permission enforced by the
    PEP. Payroll list applies a field-level obligation: sensitive PII is cleared unless the principal also holds
    `payroll.sensitive.read`.


    **Envelopes.** Single-entity reads/writes return `{ data }`; paged lists return `{ data, meta }`. Errors return `{
    errors: [{ code, type, message, details?, correlationId }] }` (5xx return a generic message and omit details). This
    spec was regenerated directly from the controllers + Joi validators.
servers:
  - url: 'http://localhost:4000'
    description: Gateway (single entry point).
tags:
  - name: health
    description: Liveness / readiness probes (auth-exempt).
  - name: auth
    description: Reference IdP — register/login (public) + current principal.
  - name: user-management
    description: >-
      Identity admin: roles, permissions, ABAC policies, users, invites, sessions, tenant config + feature flags, and
      the internal recipient directory.
  - name: annotation-governance
    description: 'Teams, tags, and polymorphic record tagging/assignment across the finance record types.'
  - name: expense
    description: >-
      Expense items + expense-report lifecycle (submit/approve/reject/reimburse/recall, comments, engine-backed
      decisions).
  - name: invoice
    description: 'Invoice lifecycle (create/submit/approve, engine-backed decisions, ERP push).'
  - name: payroll
    description: 'Employees, pay-run lifecycle (calculate/approve/disburse), and payslips.'
  - name: reporting
    description: 'Declarative report definitions, asynchronous runs + exports, and schedules.'
  - name: workflow
    description: Automation rules (author + dry-run) and ERP connector admin (config/health/sync-state/reconcile).
  - name: notification
    description: In-app inbox (reads + mark-as-read) and email notification logs.
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags:
        - health
      summary: Liveness / readiness probe
      description: >-
        Gateway liveness/readiness. Bypasses auth + context middleware. `?details=true` additionally pings the DB and
        cache (returns 503 degraded if either is down). Each downstream service exposes the same probe on its own port.
      security: []
      parameters:
        - name: details
          in: query
          required: false
          schema:
            type: string
            enum:
              - 'true'
          description: 'When `true`, include DB + cache health (may return 503).'
      responses:
        '200':
          description: Healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Degraded — a dependency (DB or cache) is down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /user-management/v1/auth/register:
    post:
      tags:
        - auth
      summary: Register a tenant + owner user
      description: 'Public. Bootstraps a new tenant and its first (owner) user, returning the session token bundle.'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created — auth/session bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Validation error — request body/params/query failed the Joi schema.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthenticated — missing or invalid Bearer JWT.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: Conflict — illegal state transition or duplicate.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /user-management/v1/auth/login:
