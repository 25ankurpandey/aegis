      description: Requires permission `payroll.payrun.approve`.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      responses:
        '200':
          description: Pending approval slots.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /payroll/v1/pay-runs/{id}/approve:
    post:
      tags: [payroll]
      summary: Approve a pay run (alias for decisions{approved})
      description: Backward-compatible alias. Requires permission `payroll.payrun.approve`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PayRunApproveRequest' }
      responses:
        '200':
          description: Pay run approved.
          content:
            application/json:
              schema: { type: object }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }

  /payroll/v1/pay-runs/{id}/disburse:
    post:
      tags: [payroll]
      summary: Disburse an approved pay run (idempotent)
      description: >
        Requires permission `payroll.payrun.disburse`. Honors an optional
        `Idempotency-Key` header so a retried disbursement is not double-applied.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/IdempotencyHeader'
      responses:
        '200':
          description: Pay run disbursed.
          content:
            application/json:
              schema: { type: object }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/ServerError' }

  # ===================== REPORTING =====================
  /reporting/v1/report-definitions:
    post:
      tags: [reporting]
      summary: Create a report definition
      description: Requires permission `report.define`. The spec is validated as data (never raw SQL).
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDefinitionRequest' }
      responses:
        '201':
          description: Definition created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }
    get:
      tags: [reporting]
      summary: List report definitions (paged)
      description: Requires permission `report.view`.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/PageSizeQuery'
      responses:
        '200':
          description: Paged definitions.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PagedEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /reporting/v1/report-runs:
    post:
      tags: [reporting]
      summary: Enqueue an asynchronous report run
      description: >
        Requires permission `report.run`. Returns 202 + { runId } with a Location
        header to poll GET /report-runs/{id}.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateRunRequest' }
      responses:
        '202':
          description: Run enqueued.
          headers:
            Location:
              description: URL to poll the run status.
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataEnvelope' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '500': { $ref: '#/components/responses/ServerError' }

  /reporting/v1/report-runs/{id}:
    get:
      tags: [reporting]
      summary: Get report run status + artifact url
      description: Requires permission `report.view`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/CorrelationHeader'
      responses:
        '200':
          description: Run status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DataEnvelope' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

