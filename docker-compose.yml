# Local development dependencies for Aegis.
# Postgres runs the app under a NON-OWNER role so Row-Level Security is actually enforced.
version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis_owner
      POSTGRES_PASSWORD: aegis_local
    ports:
      - "${AEGIS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - aegis_pg:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis_owner -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${AEGIS_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aegis_pg:
